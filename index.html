    function useInView(threshold = 0.15) {
      const ref = useRef(null);
      const [vis, setVis] = useState(false);
      useEffect(() => {
        const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVis(true); }, { threshold });
        if (ref.current) o.observe(ref.current);
        return () => o.disconnect();
      }, []);
      return [ref, vis];
    }

    function Reveal({ children, delay = 0, style = {} }) {
      const [ref, vis] = useInView();
      return (
        <div ref={ref} style={{ opacity: vis ? 1 : 0, transform: vis ? "none" : "translateY(28px)", transition: `opacity .8s ${delay}s cubic-bezier(.16,1,.3,1), transform .8s ${delay}s cubic-bezier(.16,1,.3,1)`, ...style }}>
          {children}
        </div>
      );
    }

                        onMouseEnter={() => setHIdx(i)}
                        onMouseLeave={() => setHIdx(null)}
                        style={{ width: "100%", padding: "13px 18px", background: hIdx === i ? "#1A140F" : "transparent", border: "none", borderBottom: i < INTENTS.length - 1 ? "1px solid #1A140F" : "none", color: hIdx === i ? "#D4A853" : "#6B5744", fontSize: 13.5, fontFamily: "inherit", fontWeight: 300, textAlign: "left", cursor: "pointer", transition: "all .12s", display: "flex", alignItems: "center", gap: 10, letterSpacing: "0.01em" }}
                      >
                        <span style={{ width: 3.5, height: 3.5, borderRadius: "50%", background: hIdx === i ? "#D4A853" : "#2A221A", flexShrink: 0, transition: "background .12s" }} />
                        {intent.label}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div style={{ marginTop: 80, display: "flex", flexDirection: "column", alignItems: "center", animation: "fu .6s .45s ease both" }}>
              <div style={{ width: 1, height: 48, background: "linear-gradient(to bottom, transparent, #3A2F23)", animation: "pulse 2.5s ease-in-out infinite" }} />
            </div>
          </div>
        </section>
      );
    }

    /* ─── TESTIMONIALS ───────────────────────────────────────────────────── */

    function Avatar({ img, name }) {
      const initials = name.replace(/^Dr\.?\s*/i, "").split(" ").slice(0, 2).map(w => w[0]).join("").toUpperCase();
      if (img) {
        return <img src={img} alt={name} style={{ width: 42, height: 42, borderRadius: "50%", objectFit: "cover", flexShrink: 0, border: "1.5px solid #2A221A" }} />;
      }
      return (
        <div style={{ width: 42, height: 42, borderRadius: "50%", flexShrink: 0, border: "1.5px solid #2A221A", background: "#1E1A15", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 500, color: "#6B5744", letterSpacing: "0.05em" }}>
          {initials}
        </div>
      );
    }

    function TCard({ t }) {
      const idx = t.quote.indexOf(t.highlight);
      const before = t.quote.slice(0, idx);
      const after = t.quote.slice(idx + t.highlight.length);
      return (
        <div style={{ background: "#120F0C", border: "1px solid #1E1A15", borderRadius: 12, padding: "24px 26px", display: "flex", gap: 18, alignItems: "flex-start" }}>
          <Avatar img={t.img} name={t.name} />
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 9 }}>
              <div>
                <div style={{ color: "#C4A882", fontSize: 13.5, fontWeight: 500 }}>{t.name}</div>
                <div style={{ color: "#4A3F33", fontSize: 12, marginTop: 2 }}>{t.role} · {t.company}</div>
              </div>
              <a
                href={t.linkedinUrl}
                target="_blank"
                rel="noreferrer"
                style={{ color: "#4A3F33", fontSize: 10, fontWeight: 600, textDecoration: "none", letterSpacing: "0.05em", border: "1px solid #2A221A", borderRadius: 4, padding: "3px 7px", transition: "all .2s", flexShrink: 0, alignSelf: "flex-start" }}
                onMouseEnter={e => { e.currentTarget.style.color = "#D4A853"; e.currentTarget.style.borderColor = "#D4A85355"; }}
                onMouseLeave={e => { e.currentTarget.style.color = "#4A3F33"; e.currentTarget.style.borderColor = "#2A221A"; }}
              >in</a>
            </div>
            <p style={{ color: "#6B5744", lineHeight: 1.7, fontSize: 13.5, fontWeight: 300 }}>
              "{before}<strong style={{ color: "#C4A882", fontWeight: 500 }}>{t.highlight}</strong>{after}"
            </p>
          </div>
        </div>
      );
    }

    function Testimonials() {
      const pairs = [];
      for (let i = 0; i < TESTIMONIALS.length; i += 2) pairs.push(TESTIMONIALS.slice(i, i + 2));
      const [idx, setIdx] = useState(0);
      const [k, setK] = useState(0);
      const go = (n) => { setIdx(n); setK(x => x + 1); };

      return (
        <section id="recommendations" style={{ padding: "110px 24px", background: "#0E0B09" }}>
          <HR />
          <div style={{ maxWidth: 780, margin: "72px auto 0" }}>
            <Reveal>
              <p style={{ fontSize: 11, color: "#4A3F33", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 12 }}>Social Proof</p>
              <h2 className="s-title">First, let's hear from others</h2>
              <p style={{ color: "#4A3F33", fontSize: 14.5, fontWeight: 300, marginTop: 10, marginBottom: 52 }}>I can claim anything — we need proof first.</p>
            </Reveal>
            <Reveal delay={0.12}>
              <div key={k} style={{ display: "flex", flexDirection: "column", gap: 10, animation: "sr .4s cubic-bezier(.16,1,.3,1)" }}>
                {pairs[idx].map((t, i) => <TCard key={i} t={t} />)}
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, marginTop: 28 }}>
                <button onClick={() => go((idx - 1 + pairs.length) % pairs.length)} className="nav-c">←</button>
                {pairs.map((_, i) => (
                  <button key={i} onClick={() => go(i)} style={{ width: i === idx ? 22 : 6, height: 5, borderRadius: 2.5, background: i === idx ? "#D4A853" : "#2A221A", border: "none", cursor: "pointer", transition: "all .3s", padding: 0 }} />
                ))}
                <button onClick={() => go((idx + 1) % pairs.length)} className="nav-c">→</button>
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    /* ─── PROBLEMS ───────────────────────────────────────────────────────── */

    function Problems() {
      const [i, setI] = useState(0);
      const [k, setK] = useState(0);
      useEffect(() => {
        const t = setInterval(() => { setI(x => (x + 1) % PROBLEMS.length); setK(x => x + 1); }, 5200);
        return () => clearInterval(t);
      }, []);
      const go = (n) => { setI(n); setK(x => x + 1); };
      const p = PROBLEMS[i];

      return (
        <section style={{ padding: "110px 24px", background: "#0C0A09" }}>
          <HR />
          <div style={{ maxWidth: 700, margin: "72px auto 0" }}>
            <Reveal>
              <p style={{ fontSize: 11, color: "#4A3F33", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 12 }}>Value</p>
              <h2 className="s-title">Problems I solve</h2>
            </Reveal>
            <Reveal delay={0.12}>
              <div style={{ marginTop: 44, background: "#120F0C", border: "1px solid #1E1A15", borderRadius: 14, padding: "48px 42px", minHeight: 258, display: "flex", flexDirection: "column", justifyContent: "space-between", position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", top: -50, right: -50, width: 200, height: 200, background: "radial-gradient(circle, rgba(212,168,83,0.045) 0%, transparent 70%)", pointerEvents: "none" }} />
                <div key={k} style={{ animation: "su .38s cubic-bezier(.16,1,.3,1)" }}>
                  <p style={{ fontSize: 10, color: "#4A3F33", letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 18 }}>Challenge {i + 1} / {PROBLEMS.length}</p>
                  <h3 style={{ fontSize: "clamp(1.25rem, 3vw, 1.8rem)", color: "#EDE5D8", fontWeight: 300, lineHeight: 1.35, marginBottom: 18, letterSpacing: "-0.01em", fontFamily: "'Lora', serif" }}>{p.q}</h3>
                  <p style={{ fontSize: 15.5, color: "#D4A853", fontWeight: 400, marginBottom: 10 }}>→ {p.a}</p>
                  <p style={{ color: "#4A3F33", fontSize: 13.5, lineHeight: 1.65, fontWeight: 300 }}>{p.eg}</p>
                </div>
                <div style={{ display: "flex", gap: 5, marginTop: 32 }}>
                  {PROBLEMS.map((_, n) => (
                    <button key={n} onClick={() => go(n)} style={{ flex: 1, height: 2, background: "#1A140F", border: "none", borderRadius: 1, cursor: "pointer", padding: 0, position: "relative", overflow: "hidden" }}>
                      {n === i && <div style={{ position: "absolute", inset: 0, background: "#D4A853", animation: "bf 5.2s linear forwards", transformOrigin: "left" }} />}
                      {n < i && <div style={{ position: "absolute", inset: 0, background: "#3A2F23" }} />}
                    </button>
                  ))}
                </div>
              </div>
            </Reveal>
            <Reveal delay={0.2}>
              <div style={{ marginTop: 18, padding: "22px 28px", background: "#0E0B09", border: "1px solid #1A140F", borderRadius: 10 }}>
                <p style={{ color: "#4A3F33", fontSize: 13.5, lineHeight: 1.75, fontWeight: 300 }}>
                  <span style={{ color: "#6B5744" }}>How?</span> Through analytical rigor, storytelling, and strategic thinking. And look — there are probably challenges I haven't faced yet. But I've built the critical thinking muscle to find the fastest path to a solution. That's the job.
                </p>
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    /* ─── DIFFERENTIATORS ────────────────────────────────────────────────── */

    function DiffCard({ d, i }) {
      const [ref, vis] = useInView(0.1);
      const even = i % 2 === 0;
      return (
        <div ref={ref} id={d.id} style={{ padding: "96px 24px", background: i % 2 === 0 ? "#0C0A09" : "#0E0B09", opacity: vis ? 1 : 0, transform: vis ? "none" : "translateY(36px)", transition: "opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.16,1,.3,1)" }}>
          <HR />
          <div style={{ maxWidth: 940, margin: "72px auto 0" }}>
            <div className="diff-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 52, alignItems: "center" }}>
              <div style={{ order: even ? 0 : 1 }}>
                <div style={{ display: "flex", alignItems: "baseline", gap: 14, marginBottom: 26 }}>
                  <span style={{ fontSize: 11, color: "#2A221A", letterSpacing: "0.12em", fontWeight: 500 }}>{d.num}</span>
                  <h2 style={{ fontFamily: "'Lora', Georgia, serif", fontSize: "clamp(2.6rem, 5.5vw, 4.2rem)", fontWeight: 300, color: d.accent, letterSpacing: "-0.04em", lineHeight: 1, fontStyle: "italic" }}>{d.label}</h2>
                </div>
                <p style={{ fontSize: 15.5, color: "#6B5744", lineHeight: 1.75, marginBottom: 30, fontWeight: 300 }}>{d.desc}</p>
                <div style={{ borderLeft: `2px solid ${d.accent}28`, paddingLeft: 20 }}>
                  <p style={{ fontSize: 10, color: d.accent, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 10, fontWeight: 500 }}>Case Study</p>
                  <p style={{ fontSize: 13.5, color: "#C4A882", fontWeight: 500, marginBottom: 8 }}>{d.caseStudy.title}</p>
                  <p style={{ color: "#4A3F33", fontSize: 13.5, lineHeight: 1.7, fontWeight: 300 }}>{d.caseStudy.body}</p>
                </div>
              </div>
              <div style={{ order: even ? 1 : 0, background: "#120F0C", border: "1px solid #1E1A15", borderRadius: 12, padding: "30px 14px 22px" }}>
                <p style={{ textAlign: "center", fontSize: 10, color: "#4A3F33", letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 2 }}>Skill Proficiency</p>
                <Spider data={d.skills} color={d.accent} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Differentiators() {
      return (
        <section>
          <div style={{ padding: "96px 24px 0", textAlign: "center", background: "#0C0A09" }}>
            <Reveal>
              <p style={{ fontSize: 11, color: "#4A3F33", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 12 }}>What I bring</p>
              <h2 className="s-title">Three dimensions</h2>
            </Reveal>
          </div>
          {DIFFS.map((d, i) => <DiffCard key={d.id} d={d} i={i} />)}
        </section>
      );
    }

    /* ─── MY STORY ───────────────────────────────────────────────────── */

    function Acc({ open, onToggle, label, gold, children }) {
      return (
        <div style={{ border: `1px solid ${open ? (gold ? "#D4A85330" : "#2A221A") : "#1A140F"}`, borderRadius: 9, overflow: "hidden", marginBottom: 4, transition: "border-color .22s" }}>
          <button onClick={onToggle} style={{ width: "100%", padding: gold ? "18px 20px" : "14px 18px", background: open ? "#161310" : "transparent", border: "none", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", color: open ? (gold ? "#D4A853" : "#C4A882") : "#6B5744", fontSize: gold ? 15.5 : 13.5, fontFamily: "inherit", fontWeight: 300, textAlign: "left", transition: "all .2s" }}>
            <span>{label}</span>
            <span style={{ fontSize: 11, transform: open ? "rotate(180deg)" : "none", transition: "transform .22s", display: "inline-block", color: "#D4A85366" }}>▾</span>
          </button>
          {open && <div style={{ padding: gold ? "0 20px 20px" : "0 18px 16px", animation: "su .22s ease" }}>{children}</div>}
        </div>
      );
    }

    function MyStory() {
      const [main, setMain] = useState(false);
      const [open, setOpen] = useState({});
      const tog = (i) => setOpen(s => ({ ...s, [i]: !s[i] }));
      return (
        <section id="story" style={{ padding: "110px 24px", background: "#0E0B09" }}>
          <HR />
          <div style={{ maxWidth: 620, margin: "72px auto 0" }}>
            <Reveal>
              <p style={{ fontSize: 11, color: "#4A3F33", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 12 }}>Background</p>
              <h2 className="s-title">My story</h2>
            </Reveal>
            <Reveal delay={0.12}>
              <div style={{ marginTop: 44 }}>
                <Acc open={main} onToggle={() => setMain(!main)} label="Want the full backstory?" gold>
                  <p style={{ color: "#4A3F33", lineHeight: 1.8, fontSize: 13.5, fontWeight: 300, marginBottom: 16, paddingBottom: 16, borderBottom: "1px solid #1A140F" }}>
                    I walk into a room and instinctively start mentally reorganizing it — what goes where, what's essential, what's just noise. I bring that same lens to my work: untangling messy problems, aligning stakeholders, and turning ambiguity into focused, strategic action.
                  </p>
                  <div style={{ display: "flex", flexDirection: "column" }}>
                    {STORIES.map((s, i) => (
                      <Acc key={i} open={!!open[i]} onToggle={() => tog(i)} label={s.title}>
                        <p style={{ color: "#4A3F33", lineHeight: 1.75, fontSize: 13.5, fontWeight: 300 }}>{s.body}</p>
                      </Acc>
                    ))}
                  </div>
                </Acc>
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    /* ─── FINAL ──────────────────────────────────────────────────────────── */

    function Final() {
      return (
        <section id="resume" style={{ padding: "110px 24px 80px", background: "#0C0A09" }}>
          <HR />
          <div style={{ maxWidth: 480, margin: "72px auto 0", textAlign: "center" }}>
            <Reveal>
              <h2 className="s-title">Let's connect</h2>
              <p style={{ color: "#4A3F33", fontSize: 14.5, lineHeight: 1.75, marginTop: 10, marginBottom: 44, fontWeight: 300 }}>
                Looking to hire, collaborate, or just chat about product marketing — I'd love to hear from you.
              </p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10, justifyContent: "center" }}>
                <a href="https://www.linkedin.com/in/saji-kazemi/" target="_blank" rel="noreferrer" className="bg">LinkedIn</a>
                <a href="https://drive.google.com/file/d/1z3ZnCFIUre7LWsjh1SO990UprbTtnx3J/view?usp=sharing" target="_blank" rel="noreferrer" className="bo">Resume</a>
                <a href="mailto:sajikazemi@outlook.com" className="bg2">Contact Me</a>
              </div>
            </Reveal>
            <Reveal delay={0.2}>
              <p style={{ marginTop: 72, fontSize: 10.5, color: "#2A221A", letterSpacing: "0.16em", textTransform: "uppercase" }}>Built with AI · Made for startups · Designed for clarity</p>
            </Reveal>
          </div>
        </section>
      );
    }

    /* ─── ROOT ───────────────────────────────────────────────────────────── */

    function App() {
      const scrollTo = (id) => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      return (
        <>
          <Hero scrollTo={scrollTo} />
          <Testimonials />
          <Problems />
          <Differentiators />
          <MyStory />
          <Final />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
